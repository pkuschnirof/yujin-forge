name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: ['18.20', '20.x', '22.x']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (CLI)
        run: npm run typecheck

      - name: Vitest (CLI)
        run: npm test

      - name: Build (CLI)
        run: npm run build

  # NOTE: template-smoke is intentionally NOT in CI yet.
  # The starter at templates/react-app/ imports @yujin/nac which is
  # not on npm yet. Once it ships (NAC v2.3 GA, see docs/SPEC.md
  # section 8), add a job that runs `tsc --noEmit` inside
  # templates/react-app/ as a real gate.
